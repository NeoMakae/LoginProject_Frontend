<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Register</h2>

    <!-- Success message -->
    <p *ngIf="message === 'success'" class="message success">
      Registration successful! You can now login.
    </p>

    <!-- Error message -->
    <p *ngIf="message === 'exists' || message === 'error'" class="message error">
      {{ message === 'exists' ? 'User already exists!' : 'Registration failed. Try again.' }}
    </p>

    <form *ngIf="!message || message === 'error'" (ngSubmit)="register()" class="auth-form">
      <div class="form-group">
        <input
          type="text"
          placeholder="First Name"
          [(ngModel)]="firstName"
          name="firstName"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="text"
          placeholder="Last Name"
          [(ngModel)]="lastName"
          name="lastName"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <button type="submit" class="btn-register">Register</button>
    </form>
  </div>
</div>
