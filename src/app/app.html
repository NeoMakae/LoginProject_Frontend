<div class="app-wrapper">
  <h1 class="headline">Wonga</h1>

  <!-- Home page buttons -->
  <div *ngIf="currentPage === 'home'" class="home-buttons">
    <button (click)="showLogin()" class="btn-home">Login</button>
    <button (click)="showRegister()" class="btn-home">Register</button>
  </div>

  <!-- Register form -->
  <div *ngIf="currentPage === 'register'">
    <app-register (pageChange)="currentPage = $event"></app-register>
  </div>

  <!-- Login form -->
  <div *ngIf="currentPage === 'login'">
    <app-login 
      (pageChange)="currentPage = $event"
      (loginSuccess)="user = $event">
    </app-login>
  </div>

  <!-- User Details page -->
  <div *ngIf="currentPage === 'userDetails' && user" class="auth-card">
    <h2>User Details</h2>
    <p><strong>First Name:</strong> {{ user.firstName }}</p>
    <p><strong>Last Name:</strong> {{ user.lastName }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
  </div>

  <!-- User already exists -->
  <div *ngIf="currentPage === 'exists'" class="auth-card">
    <p class="message error">Ooops, the user already exists!</p>
  </div>

  <!-- Back button -->
  <div *ngIf="currentPage !== 'home'" class="back-link">
    <a (click)="showHome()">← Back</a>
  </div>
</div>
