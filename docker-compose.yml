version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: login_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: "C:/Users/makae/IdeaProjects/LoginInterviewProject"
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/login_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      - db

  frontend:
    build: "C:/Users/makae/OneDrive/Desktop/frontend-login"
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data: